<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#080b12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ConFin">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <title>ConFin</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css?v=4.1.0">
</head>
<body>
  <div id="app" class="app-shell">
    <main id="view" class="view" aria-live="polite"></main>

    <button id="fab" class="fab" type="button" aria-label="Nuevo movimiento">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
    </button>

    <nav class="bottom-nav" aria-label="Navegación principal">
      <button class="nav-item active" data-route="home" type="button">
        <svg viewBox="0 0 24 24"><path d="m3 11 9-8 9 8v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg><span>Inicio</span>
      </button>
      <button class="nav-item" data-route="transactions" type="button">
        <svg viewBox="0 0 24 24"><path d="M7 7h13m0 0-3-3m3 3-3 3M17 17H4m0 0 3 3m-3-3 3-3"/></svg><span>Movimientos</span>
      </button>
      <button class="nav-item" data-route="budgets" type="button">
        <svg viewBox="0 0 24 24"><path d="M12 3v9h9A9 9 0 1 1 12 3Z"/><path d="M15 3.5A8.5 8.5 0 0 1 20.5 9H15Z"/></svg><span>Presupuestos</span>
      </button>
      <button class="nav-item" data-route="goals" type="button">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg><span>Metas</span>
      </button>
      <button class="nav-item" data-route="accounts" type="button">
        <svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M3 9h18M16 14h2"/></svg><span>Cuentas</span>
      </button>
    </nav>
  </div>

  <div id="modalRoot"></div>
  <input id="importFile" type="file" accept="application/json" hidden>
  <div id="toast" class="toast" role="status"></div>

  <script src="app.js?v=4.1.0" defer></script>
</body>
</html>
